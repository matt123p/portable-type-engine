# ============================================
# Simple 480x480 Example Screen
# ============================================
# A minimal, standalone example of using the
# portable type engine.
# ============================================

esphome:
  name: example-480p-screen
  friendly_name: "Example 480p Screen"
  platformio_options:
    board_build.flash_mode: dio
  on_boot:
    - priority: -100
      then:
        - light.turn_on:
            id: display_backlight
            brightness: 100%

# --------------------------------------------
# ESP32 Settings
# --------------------------------------------
esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

# --------------------------------------------
# WiFi (optional - comment out if not needed)
# --------------------------------------------
wifi:
  ssid: "YourWiFiSSID"
  password: "YourWiFiPassword"
  ap:
    ssid: "Example Screen Fallback"
    password: "example123"

# --------------------------------------------
# Logger
# --------------------------------------------
logger:
  hardware_uart: UART0

# --------------------------------------------
# I2C for touchscreen (removed - not needed)
# --------------------------------------------
i2c:
  - id: bus_a
    sda: GPIO19
    scl: GPIO45

# --------------------------------------------
# SPI for display
# --------------------------------------------
spi:
  - id: lcd_spi
    clk_pin: GPIO48
    mosi_pin: GPIO47

# --------------------------------------------
# Display - ST7701 480x480
# --------------------------------------------
display:
  - platform: st7701s
    id: st7701_display
    update_interval: never
    data_rate: 8MHz
    spi_mode: MODE3
    color_order: RGB
    dimensions:
      width: 480
      height: 480
    invert_colors: false
    transform:
      mirror_x: false
      mirror_y: false
    cs_pin: 39
    de_pin: 18
    hsync_pin: 16
    vsync_pin: 17
    pclk_pin: 21
    init_sequence:
    - 1
    - [ 0xff, 0x77, 0x1, 0x0, 0x0, 0x10 ]
    - [ 0xcd, 0x0 ]
    hsync_pulse_width: 8
    hsync_front_porch: 10
    hsync_back_porch: 50
    vsync_pulse_width: 8
    vsync_front_porch: 10
    vsync_back_porch: 20
    pclk_frequency: 12MHz
    pclk_inverted: false

    data_pins:
      red:
      - 11
      - 12
      - 13
      - 14
      - 0
      green:
      - 8
      - 20
      - 3
      - 46
      - 9
      - 10
      blue:
      - 4
      - 5
      - 6
      - 7
      - 15

# --------------------------------------------
# Backlight
# --------------------------------------------
output:
  - platform: ledc
    pin: GPIO38
    id: backlight
    frequency: 100Hz

light:
  - platform: monochromatic
    output: backlight
    name: Display Backlight
    id: display_backlight
    restore_mode: ALWAYS_ON

# --------------------------------------------
# Time - for clock updates
# --------------------------------------------
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/London

# --------------------------------------------
# Portable Type Engine Fonts
# --------------------------------------------
external_components:
  - source:
      type: git
      url: https://github.com/matt123p/portable-type-engine.git
      ref: v2.0.1
      path: src/esphome
    components: [pte_font]

pte_font:
  - id: ui_font
    font: roboto_regular
  - id: ui_font_bold
    font: roboto_bold
  - id: ui_icon_font
    font_file: fonts/materialdesignicons-webfont.ttf
    ranges:
      - "0xf007e-0xf007e" # battery-50
      - "0xf0335-0xf0335" # lightbulb
      - "0xf0405-0xf0405" # outdoor-lamp
      - "0xf0599-0xf0599" # weather-sunny
      - "0xf12bd-0xf12bd" # home-floor-1
      - "0xf12be-0xf12be" # home-floor-2

# --------------------------------------------
# Images
# --------------------------------------------
image:
  rgb565:
    opaque:
      - file: background.png
        id: wallpaper_day
        resize: 480x480

# --------------------------------------------
# LVGL - Exact same layout as esp_hall (480x480)
# --------------------------------------------
lvgl:
