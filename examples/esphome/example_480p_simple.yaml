# --------------------------------------------
# Interval - Update time every second
# --------------------------------------------
interval:
  - interval: 1s
    then:
      - lambda: |-
          auto now = std::time(nullptr);
          auto *tm = std::localtime(&now);
          char time_str[16];
          std::strftime(time_str, sizeof(time_str), "%H:%M", tm);

          char date_str[48];
          std::strftime(date_str, sizeof(date_str), "%A %d %B", tm);

          if (lvgl_home_clock != nullptr) {
            lv_label_set_text(lvgl_home_clock, time_str);
          }
          if (lvgl_home_date != nullptr) {
            lv_label_set_text(lvgl_home_date, date_str);
          }
